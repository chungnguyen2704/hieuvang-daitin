<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1A0E0E">
  <title>Bảng giá vàng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800;900&family=Lora:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400;1,500;1,600&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Public refresh button — sticky, vừa tay */
    .public-refresh {
      position: sticky;
      bottom: 1rem;
      width: 100%;
      max-width: 480px;
      margin: 1rem auto 0;
      z-index: 5;
    }
    .public-refresh .btn {
      box-shadow: var(--shadow-lg);
    }
    .btn.is-loading svg { animation: spin 1s linear infinite; }
    .btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body class="public-page">
  <div id="public-root" class="public">
    <header class="public__header">
      <h1 class="public__shop-name">HIỆU VÀNG</h1>
      <div class="public__tagline">Đang tải…</div>
      <div class="public__address"></div>
      <div class="public__updated">
        <span>Đang tải…</span>
      </div>
    </header>

    <main class="public__list">
      <!-- cards rendered by app.js -->
    </main>

    <div class="public-refresh">
      <button id="refresh-btn" class="btn btn--gold btn--xl" aria-label="Cập nhật giá">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"></path>
          <path d="M21 3v5h-5"></path>
        </svg>
        <span>Cập nhật giá mới</span>
      </button>
    </div>

    <footer class="public__footer">
      <p class="public__footer-disclaimer">
        ◆ QUÝ KHÁCH VUI LÒNG KIỂM TRA KỸ TRỌNG LƯỢNG, TUỔI VÀNG VÀ GIÁ NIÊM YẾT TRƯỚC KHI GIAO DỊCH. TIỆM MIỄN TRÁCH SAU KHI ĐÃ HOÀN TẤT THANH TOÁN. ◆
      </p>
      <p>Đơn vị: <strong>VND / chỉ</strong> &nbsp;·&nbsp; Giá cập nhật theo thị trường, có thể thay đổi không báo trước.</p>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    TiemVang.init('public');
  </script>
</body>
</html>
